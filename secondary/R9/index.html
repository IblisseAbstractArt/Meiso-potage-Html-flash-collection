<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mesopota - Archive Selection Full Width</title>
    <style>
        /* BASE */
        body { 
            background-color: #c4c4c4; 
            color: #333; 
            font-family: "MS PGothic", sans-serif; 
            margin: 0; 
            padding: 0;
        }

        /* SCANLINES (Se mantienen sobre todo) */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        /* Contenedor central para el logo, la galería y el footer */
        .container {
            width: 850px;
            margin: 0 auto;
            position: relative;
        }

        /* --- BARRA DE NAVEGACIÓN (ANCHO TOTAL) --- */
        #headernav-full {
            background-color: #cc8000;
            width: 100%; /* Esto hace que llegue a ambos extremos */
            padding: 10px 0;
            margin-bottom: 20px;
        }

        /* --- BARRA DE TÍTULO DE LISTA (ANCHO TOTAL) --- */
        .orange-header-full {
            background-color: #cc8000;
            width: 100%; /* Extremo a extremo */
            color: #fff;
            padding: 8px 0;
            margin-bottom: 25px;
        }

        /* Estilo del texto dentro de las barras para que no se pegue al borde de la pantalla */
        .inner-content {
            width: 850px;
            margin: 0 auto;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .orange-menu { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
        }
        .orange-menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px;
        }

        /* GALERÍA */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding-bottom: 40px;
        }

        .game-card {
            background: #b0b0b0;
            border: 1px solid #8c5300;
            padding: 8px;
            text-align: center;
            text-decoration: none;
            color: #0033cc; /* Color de link azul clásico */
            font-size: 13px;
        }

        .game-card img {
            width: 100%;
            height: auto;
            border: 1px solid #333;
            margin-bottom: 8px;
        }
/* --- Ajuste uniforme para las imágenes del grid --- */
/* Nota: Asegúrate de que el selector coincida con el contenedor de tus juegos */
img.cover-image { /* O aplica esta clase directamente a tus etiquetas <img> */
    width: 320px;       /* Ancho fijo para todas las carátulas */
    height: 180px;      /* Alto fijo para alinear la cuadrícula */
    object-fit: cover;  /* LLena el espacio recortando el sobrante sin deformar */
    object-position: center; /* Centra la imagen dentro del "marco" */
    border: 1px solid #999; /* Opcional: un borde para mantener el estilo retro */
    display: block;     /* Evita espacios fantasmas debajo de la imagen */
}
        .game-type { color: #666; font-size: 10px; margin-top: 4px; }

        #footer { text-align: center; padding: 40px 0; color: #777; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="header" style="padding: 20px 0;">
            <h1 style="color: #8c5300; margin: 0; font-size: 22px;">迷走ポタージュ <span style="font-size: 12px; font-weight: normal; color: #666;">- Archive Selection</span></h1> 
        </div>
    </div>

    <nav id="headernav-full">
        <div class="inner-content">
            <ul class="orange-menu">
                <li><a href="./index.html">TOP</a></li>
            </ul>
        </div>
    </nav>

    <div class="orange-header-full">
        <div class="inner-content">
            <h2 style="margin: 0; font-size: 20px;">作品リスト <span style="font-size: 14px; font-weight: normal;">Product List</span></h2>
        </div>
    </div>

    <div class="gallery-grid">
        <a href="kagi.html" class="Flash Game">
            <img class="cover-image" src="cover/compgacha.jpg" alt="gacha">
            <div class="game-title">CompGacha</div>
            <div class="game-type">Game</div>
        </a>

        <a href="yuki.html" class="Flash Game">
            <img class="cover-image" src="cover/moco.jpg" alt="moco">
            <div class="game-title">Mocou's Kitchen</div>
            <div class="game-type">Game</div>
        </a>

        <a href="miya.html" class="Flash Game">
            <img class="cover-image" src="cover/pacheStone.jpg" alt="pache">
            <div class="game-title">Patchouli Knowledge and the Philosopher's Stone</div>
            <div class="game-type">Game</div>
        </a>

        </div>
  
    <div id="footer" style="text-align: center; padding: 30px; color: #666; font-size: 12px;">
        <p>Select a flash animation / game to start.</p>
        <address>Copyright &copy; 2008-2026 迷走ポタージュ / Average Rumia. Preservation Project.</address>
    </div>
</div>

</body>
  </html>
