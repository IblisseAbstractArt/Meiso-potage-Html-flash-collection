    /* 3. Animación de parpadeo (Flicker) */
    @keyframes flicker {
        0% { opacity: 0.98; }
        5% { opacity: 0.95; }
        10% { opacity: 0.99; }
        100% { opacity: 5; }
    }

    body {
        background-color: #000;
        color: #ffffff;
        margin: 0;
        padding: 20px;
        font-family: sans-serif;

    }
