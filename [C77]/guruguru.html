<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>GuruGuru [Ruffle fix]</title>
    <link rel="icon" type="image/png" href="../icon64.png">
</head>
<body bgcolor="#000000" style="margin:0; color:white;">

<center>
    <h3>GuruGuru [Ruffle fix]</h3>
    
    <div id="ruffle-player"></div>
    
    <script src="https://js.ruffle.rs/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-player");
            container.appendChild(player);
            
            player.load("swf/guruguru.swf"); 
            
            player.style.width = "800px";
            player.style.height = "600px";
    </script>

    <br>
    <a href="../index.html" style="color: #58a6ff;">[ Return to the menu ]</a>
</center>

</body>
</html>
